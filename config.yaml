# FoldFit Configuration
# All paths and parameters for antibody LoRA fine-tuning of OpenFold3

# ---- Paths ----
paths:
  openfold3_dir: ../openfold-3
  checkpoint: ~/.openfold3/of3-p2-155k.pt
  ccd: ~/.openfold3/chemical_component_dictionary.cif
  output_dir: ./output/lora_antibody
  data_dir: ./data/antibody_training
  databases_dir: /home/rubencr/Escritorio/projects/molserve/data

# ---- Data Acquisition ----
data:
  max_structures: 100
  max_resolution: 3.0
  pdb_ids_file: null

# ---- MSA Configuration ----
msa:
  # Method: "colabfold" | "jackhmmer" | "mmseqs"
  method: mmseqs

  colabfold:
    host_url: https://api.colabfold.com
    user_agent: openfold3-antibody-lora

  jackhmmer:
    binary_path: /usr/bin/jackhmmer
    n_cpu: 8
    n_iter: 1
    e_value: 0.0001
    databases:
      uniref90:
        path: /data/databases/uniref90/uniref90.fasta
        max_sequences: 10000
      mgnify:
        path: /data/databases/mgnify/mgy_clusters_2022_05.fa
        max_sequences: 5000
      uniprot:
        path: /data/databases/uniprot/uniprot.fasta
        max_sequences: 50000

  mmseqs:
    binary_path: /home/rubencr/miniconda3/envs/nomosis/bin/mmseqs
    n_cpu: 8
    sensitivity: 7.5           # -s parameter (1-7.5, higher = more sensitive)
    max_seqs: 10000            # --max-seqs
    e_value: 0.001
    databases:
      swissprot:
        path: /home/rubencr/Escritorio/projects/molserve/data/mmseqs_db/swissprot
        max_sequences: 10000
        # output_name: OF3 filters MSA files by filename against max_seq_counts.
        # This must match a key like "uniref90_hits", "uniprot_hits", etc.
        output_name: uniref90_hits

  hhblits:
    binary_path: /usr/bin/hhblits
    n_cpu: 4
    n_iter: 2
    databases:
      pdb100:
        path: /home/rubencr/Escritorio/projects/molserve/data/hhblits_db/pdb100

# ---- LoRA Configuration ----
lora:
  rank: 8
  alpha: 16.0
  dropout: 0.05
  target_modules:
    - linear_q
    - linear_k
    - linear_v
    - linear_o
  target_blocks:
    - pairformer_stack

# ---- Training Configuration ----
training:
  max_epochs: 50
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 100
  gradient_clip_val: 1.0
  scheduler: cosine
  precision: bf16-mixed
  ema_decay: 0.999
  seed: 42
  token_budget: 256
  devices: 1

# ---- Preprocessing ----
preprocessing:
  num_workers: 0
  max_polymer_chains: 20
