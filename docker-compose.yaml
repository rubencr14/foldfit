services:
  foldfit:
    build: .
    ports:
      - "127.0.0.1:8000:8000"  # bind localhost only, not 0.0.0.0
    volumes:
      - ./config.yaml:/app/config.yaml:ro      # config read-only
      - ./data:/app/data:ro                     # training data read-only
      - checkpoints:/app/checkpoints            # named volume for outputs
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "4"
    # GPU support (requires nvidia-container-toolkit)
    # Uncomment for GPU:
    # runtime: nvidia
    security_opt:
      - no-new-privileges:true        # prevent privilege escalation
    read_only: true                    # read-only root filesystem
    tmpfs:
      - /tmp:size=512M                # writable tmp for OpenFold
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  checkpoints:
